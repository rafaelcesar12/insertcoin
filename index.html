<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insert Coin — Login</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }

    /* Animated background grid */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,224,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,224,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove {
      from { background-position: 0 0, 0 0; }
      to   { background-position: 40px 40px, 40px 40px; }
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      opacity: 0.35;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--neon-purple); top: -10%; left: -10%; }
    .orb-2 { width: 300px; height: 300px; background: var(--neon-blue); bottom: 5%; right: -5%; }

    /* Auth container */
    .auth-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 16px rgba(0,255,200,0.6));
    }
    .logo-name {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: var(--neon-green);
      text-shadow: var(--glow-green);
    }
    .logo-tagline {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      margin-top: 4px;
    }

    /* Auth card */
    .auth-card {
      background: rgba(10, 11, 30, 0.92);
      border: 1px solid rgba(0,255,200,0.2);
      border-radius: var(--radius-lg);
      padding: 32px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(0,255,200,0.06);
    }

    .auth-card h2 {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text);
      margin-bottom: 24px;
      text-align: center;
    }

    .btn-primary { width: 100%; margin-top: 8px; padding: 13px; font-size: 13px; }

    .auth-links {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      font-size: 13px;
    }
    .auth-links a {
      color: var(--text-muted);
      transition: color var(--transition);
    }
    .auth-links a:hover { color: var(--neon-green); }

    .error-msg {
      background: rgba(255,51,85,0.1);
      border: 1px solid rgba(255,51,85,0.3);
      border-radius: var(--radius);
      color: #ff3355;
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 12px;
      display: none;
    }

    /* Pixel art corner decoration */
    .pixel-corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--neon-green);
      border-style: solid;
      opacity: 0.5;
    }
    .pc-tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .pc-tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
    .pc-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
    .pc-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
    .auth-card { position: relative; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-wrap">
    <div class="logo">
      <span class="logo-icon">🎮</span>
      <div class="logo-name">INSERT COIN</div>
      <div class="logo-tagline">▶ PRESS START TO PLAY ◀</div>
    </div>

    <div class="auth-card">
      <div class="pixel-corner pc-tl"></div>
      <div class="pixel-corner pc-tr"></div>
      <div class="pixel-corner pc-bl"></div>
      <div class="pixel-corner pc-br"></div>

      <h2>FAZER LOGIN</h2>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <div class="error-msg" id="error-msg"></div>

      <button class="btn btn-primary" id="btn-login">
        <span id="btn-text">▶ ENTRAR</span>
        <div class="spinner" id="spinner" style="display:none"></div>
      </button>

      <div class="auth-links">
        <a href="signup.html">Criar conta</a>
        <a href="#" id="link-reset">Esqueci a senha</a>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { loginUser, resetPassword, redirectIfLoggedIn } from "./auth.js";

    redirectIfLoggedIn();

    const emailEl   = document.getElementById("email");
    const passEl    = document.getElementById("password");
    const btnLogin  = document.getElementById("btn-login");
    const btnText   = document.getElementById("btn-text");
    const spinner   = document.getElementById("spinner");
    const errorMsg  = document.getElementById("error-msg");
    const linkReset = document.getElementById("link-reset");

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = "block";
    }
    function hideError() {
      errorMsg.style.display = "none";
    }
    function setLoading(v) {
      btnLogin.disabled = v;
      btnText.style.display = v ? "none" : "inline";
      spinner.style.display = v ? "block" : "none";
    }
    function showToast(msg, type = "success") {
      const c = document.getElementById("toast-container");
      const t = document.createElement("div");
      t.className = `toast ${type}`;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3100);
    }

    const firebaseErrors = {
      "auth/user-not-found": "E-mail não encontrado.",
      "auth/wrong-password": "Senha incorreta.",
      "auth/invalid-email": "E-mail inválido.",
      "auth/too-many-requests": "Muitas tentativas. Tente novamente mais tarde.",
      "auth/invalid-credential": "E-mail ou senha incorretos."
    };

    btnLogin.addEventListener("click", async () => {
      hideError();
      const email    = emailEl.value.trim();
      const password = passEl.value;

      if (!email || !password) {
        showError("Preencha todos os campos.");
        return;
      }

      setLoading(true);
      try {
        await loginUser(email, password);
        showToast("Login realizado! Redirecionando...");
        setTimeout(() => (window.location.href = "home.html"), 800);
      } catch (e) {
        showError(firebaseErrors[e.code] || "Erro ao fazer login. Tente novamente.");
        setLoading(false);
      }
    });

    // Enter key
    [emailEl, passEl].forEach(el =>
      el.addEventListener("keydown", e => { if (e.key === "Enter") btnLogin.click(); })
    );

    linkReset.addEventListener("click", async (e) => {
      e.preventDefault();
      const email = emailEl.value.trim();
      if (!email) {
        showError("Digite seu e-mail para redefinir a senha.");
        return;
      }
      try {
        await resetPassword(email);
        showToast("E-mail de redefinição enviado!", "info");
      } catch {
        showError("Não foi possível enviar o e-mail. Verifique o endereço.");
      }
    });
  </script>
</body>
</html>
