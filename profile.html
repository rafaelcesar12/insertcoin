<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insert Coin — Perfil</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <style>
    body { background: var(--bg); min-height: 100vh; }
    .bg-grid { position:fixed;inset:0;background-image:linear-gradient(rgba(123,44,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(123,44,255,0.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none; }

    .topbar { position:sticky;top:0;z-index:100;background:rgba(5,5,16,0.92);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:16px; }
    .topbar-logo { font-family:var(--font-head);font-size:16px;font-weight:900;letter-spacing:0.1em;color:var(--neon-green);text-shadow:var(--glow-green); }

    .profile-wrap { max-width:800px;margin:0 auto;padding:24px 20px 60px;display:flex;flex-direction:column;gap:20px;position:relative;z-index:1; }

    .profile-banner { height:160px;border-radius:var(--radius-lg);background:linear-gradient(135deg,#0d0230,#0a0b1e,#050a2a,#0d0230);position:relative;overflow:hidden;border:1px solid var(--border); }
    .profile-banner::before { content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(123,44,255,0.2),rgba(0,224,255,0.1),rgba(0,255,200,0.15)); }
    .banner-pattern { position:absolute;inset:0;opacity:0.08;background-image:repeating-linear-gradient(45deg,var(--neon-purple) 0px,var(--neon-purple) 1px,transparent 1px,transparent 20px); }

    .profile-card { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-top:-50px;position:relative; }
    .profile-top { display:flex;align-items:flex-end;gap:16px;margin-bottom:16px; }
    .profile-avatar { width:80px;height:80px;border-radius:50%;border:3px solid var(--neon-green);box-shadow:var(--glow-green);background:var(--bg-card2);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:28px;color:var(--neon-green);flex-shrink:0;overflow:hidden; }
    .profile-nick { font-family:var(--font-head);font-size:20px;font-weight:900;color:var(--text);margin-bottom:6px; }
    .profile-meta { display:flex;flex-wrap:wrap;gap:8px;align-items:center; }
    .profile-email { font-size:12px;color:var(--text-muted);font-family:var(--font-mono); }
    .profile-location { font-size:12px;color:var(--text-muted); }

    .level-section { display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;padding:14px;background:var(--bg-card2);border-radius:var(--radius);margin-bottom:16px; }
    .level-badge { text-align:center;background:linear-gradient(135deg,rgba(123,44,255,0.2),rgba(0,224,255,0.1));border:1px solid rgba(123,44,255,0.3);border-radius:var(--radius);padding:8px 14px;min-width:70px; }
    .level-num { font-family:var(--font-head);font-size:24px;font-weight:900;color:var(--neon-purple);text-shadow:var(--glow-purple); }
    .level-lbl { font-family:var(--font-mono);font-size:9px;color:var(--text-muted);letter-spacing:0.1em; }
    .xp-section-label { display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-bottom:6px;font-family:var(--font-mono); }

    /* Social links display */
    .social-links { display:flex;flex-wrap:wrap;gap:8px;margin-top:8px; }
    .social-link-btn {
      display:inline-flex;align-items:center;gap:6px;padding:5px 12px;
      border-radius:100px;font-size:11px;font-family:var(--font-head);letter-spacing:0.05em;
      border:1px solid;transition:all var(--transition);text-decoration:none;
    }
    .social-discord  { border-color:rgba(88,101,242,0.4);color:#5865F2;background:rgba(88,101,242,0.08); }
    .social-discord:hover  { background:rgba(88,101,242,0.2); }
    .social-steam    { border-color:rgba(102,192,244,0.4);color:#66C0F4;background:rgba(102,192,244,0.08); }
    .social-steam:hover    { background:rgba(102,192,244,0.2); }
    .social-epic     { border-color:rgba(255,255,255,0.2);color:#fff;background:rgba(255,255,255,0.04); }
    .social-epic:hover     { background:rgba(255,255,255,0.1); }
    .social-xbox     { border-color:rgba(16,124,16,0.4);color:#107C10;background:rgba(16,124,16,0.08); }
    .social-xbox:hover     { background:rgba(16,124,16,0.2); }
    .social-psn      { border-color:rgba(0,70,160,0.4);color:#0046A0;background:rgba(0,70,160,0.08); }
    .social-psn:hover      { background:rgba(0,70,160,0.2); }
    .social-twitch   { border-color:rgba(145,70,255,0.4);color:#9146FF;background:rgba(145,70,255,0.08); }
    .social-twitch:hover   { background:rgba(145,70,255,0.2); }
    .social-youtube  { border-color:rgba(255,0,0,0.4);color:#FF0000;background:rgba(255,0,0,0.08); }
    .social-youtube:hover  { background:rgba(255,0,0,0.2); }

    .section-title { font-family:var(--font-head);font-size:11px;letter-spacing:0.12em;color:var(--text-muted);margin-bottom:10px; }

    /* Edit form */
    .edit-section { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px; }
    .edit-section h3 { font-family:var(--font-head);font-size:13px;letter-spacing:0.1em;color:var(--neon-green);margin-bottom:20px;display:flex;align-items:center;gap:8px; }
    .edit-section h3::before { content:"//";color:var(--text-muted); }
    .edit-row { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
    .edit-row-3 { display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px; }
    @media(max-width:540px){ .edit-row,.edit-row-3{grid-template-columns:1fr;} }

    .platform-grid { display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:6px; }
    .platform-btn { background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);padding:8px 4px;text-align:center;cursor:pointer;transition:all var(--transition);color:var(--text-muted);font-size:10px;font-family:var(--font-head); }
    .platform-btn .p-icon { font-size:18px;display:block;margin-bottom:3px; }
    .platform-btn:hover,.platform-btn.selected { border-color:var(--neon-purple);background:rgba(123,44,255,0.12);color:var(--neon-purple); }

    .games-tags { display:flex;flex-wrap:wrap;gap:6px;min-height:28px;margin-top:8px; }
    .game-tag .remove-tag { cursor:pointer;margin-left:3px; }
    .game-tag .remove-tag:hover { color:#ff3355; }

    .social-section { background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:4px; }
    .social-section-title { font-family:var(--font-head);font-size:10px;letter-spacing:0.12em;color:var(--text-muted);margin-bottom:12px; }
    .social-input-row { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
    @media(max-width:540px){ .social-input-row{grid-template-columns:1fr;} }
    .social-input-group { display:flex;align-items:center;gap:8px; }
    .social-input-group .s-icon { font-size:16px;flex-shrink:0; }

    .save-msg { font-size:13px;text-align:center;margin-top:10px;display:none; }
    .save-msg.ok { color:var(--neon-green); }
    .save-msg.err { color:#ff3355; }
    .page-loading { display:flex;justify-content:center;padding:60px; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <header class="topbar">
    <div class="topbar-logo">🎮 INSERT COIN</div>
    <div style="display:flex;gap:8px;">
      <a class="btn btn-ghost" href="home.html" style="padding:6px 14px;font-size:10px;">← FEED</a>
      <button class="btn btn-danger" id="btn-logout" style="padding:6px 14px;font-size:10px;">SAIR</button>
    </div>
  </header>

  <div id="page-loading" class="page-loading"><div class="spinner"></div></div>

  <div class="profile-wrap" id="profile-wrap" style="display:none">
    <div class="profile-banner"><div class="banner-pattern"></div></div>

    <div class="profile-card">
      <div class="profile-top">
        <div class="profile-avatar" id="p-avatar">?</div>
        <div style="flex:1;padding-bottom:4px;">
          <div class="profile-nick" id="p-nick">...</div>
          <div class="profile-meta">
            <span class="platform-badge" id="p-platform"></span>
            <span class="profile-email" id="p-email"></span>
            <span class="profile-location" id="p-location"></span>
          </div>
        </div>
      </div>

      <div class="level-section">
        <div class="level-badge">
          <div class="level-num" id="p-level">1</div>
          <div class="level-lbl">NÍVEL</div>
        </div>
        <div style="flex:1">
          <div class="xp-section-label"><span>XP</span><span><span id="p-xp">0</span> / <span id="p-xp-next">100</span></span></div>
          <div class="xp-bar-wrap"><div class="xp-bar-fill" id="p-xp-bar" style="width:0%"></div></div>
        </div>
      </div>

      <div class="section-title">BIO</div>
      <p id="p-bio" style="font-size:14px;color:var(--text-muted);min-height:20px;margin-bottom:16px;"></p>

      <div class="section-title">JOGOS FAVORITOS</div>
      <div class="games-tags" id="p-games" style="margin-bottom:16px;"></div>

      <div class="section-title">LINKS & PLATAFORMAS</div>
      <div class="social-links" id="p-social-links"></div>
    </div>

    <!-- Edit form -->
    <div class="edit-section">
      <h3>EDITAR PERFIL</h3>

      <div class="edit-row" style="margin-bottom:16px;">
        <div class="form-group">
          <label for="e-nick">Nickname</label>
          <input type="text" id="e-nick" maxlength="20" />
        </div>
        <div class="form-group">
          <label for="e-bio">Bio</label>
          <input type="text" id="e-bio" maxlength="120" placeholder="Fale sobre você..." />
        </div>
      </div>

      <!-- Location -->
      <div class="form-group" style="margin-bottom:4px;">
        <label>Localização <span style="color:var(--text-muted);font-size:9px;">(opcional)</span></label>
      </div>
      <div class="edit-row-3" style="margin-bottom:16px;">
        <div class="form-group">
          <label for="e-city">Cidade</label>
          <input type="text" id="e-city" maxlength="40" placeholder="Ex: São Paulo" />
        </div>
        <div class="form-group">
          <label for="e-state">Estado</label>
          <input type="text" id="e-state" maxlength="30" placeholder="Ex: SP" />
        </div>
        <div class="form-group">
          <label for="e-country">País</label>
          <input type="text" id="e-country" maxlength="30" placeholder="Ex: Brasil" />
        </div>
      </div>

      <!-- Platform -->
      <div class="form-group" style="margin-bottom:16px;">
        <label>Plataforma Principal</label>
        <div class="platform-grid">
          <div class="platform-btn" data-platform="PC"><span class="p-icon">🖥️</span>PC</div>
          <div class="platform-btn" data-platform="PlayStation"><span class="p-icon">🎮</span>PS</div>
          <div class="platform-btn" data-platform="Xbox"><span class="p-icon">🟩</span>Xbox</div>
          <div class="platform-btn" data-platform="Nintendo"><span class="p-icon">🔴</span>Switch</div>
          <div class="platform-btn" data-platform="Mobile"><span class="p-icon">📱</span>Mobile</div>
        </div>
      </div>

      <!-- Games -->
      <div class="form-group" style="margin-bottom:16px;">
        <label>Jogos Favoritos</label>
        <input type="text" id="e-game-input" placeholder="Digite e pressione Enter (máx. 8)" />
        <div class="games-tags" id="e-games-tags"></div>
      </div>

      <!-- Social links -->
      <div class="social-section">
        <div class="social-section-title">LINKS DE PLATAFORMAS <span style="color:var(--text-muted);font-size:9px;">(opcional — username ou URL)</span></div>
        <div class="social-input-row">
          <div class="social-input-group">
            <span class="s-icon">💬</span>
            <div class="form-group" style="flex:1;margin-bottom:0;">
              <label for="e-discord">Discord</label>
              <input type="text" id="e-discord" placeholder="usuario#1234" />
            </div>
          </div>
          <div class="social-input-group">
            <span class="s-icon">🎮</span>
            <div class="form-group" style="flex:1;margin-bottom:0;">
              <label for="e-steam">Steam</label>
              <input type="text" id="e-steam" placeholder="URL ou username" />
            </div>
          </div>
          <div class="social-input-group">
            <span class="s-icon">⬜</span>
            <div class="form-group" style="flex:1;margin-bottom:0;">
              <label for="e-epic">Epic Games</label>
              <input type="text" id="e-epic" placeholder="Username Epic" />
            </div>
          </div>
          <div class="social-input-group">
            <span class="s-icon">🟩</span>
            <div class="form-group" style="flex:1;margin-bottom:0;">
              <label for="e-xbox">Xbox / Gamertag</label>
              <input type="text" id="e-xbox" placeholder="Gamertag" />
            </div>
          </div>
          <div class="social-input-group">
            <span class="s-icon">🎮</span>
            <div class="form-group" style="flex:1;margin-bottom:0;">
              <label for="e-psn">PlayStation Network</label>
              <input type="text" id="e-psn" placeholder="PSN ID" />
            </div>
          </div>
          <div class="social-input-group">
            <span class="s-icon">🟣</span>
            <div class="form-group" style="flex:1;margin-bottom:0;">
              <label for="e-twitch">Twitch</label>
              <input type="text" id="e-twitch" placeholder="twitch.tv/usuario" />
            </div>
          </div>
          <div class="social-input-group">
            <span class="s-icon">🔴</span>
            <div class="form-group" style="flex:1;margin-bottom:0;">
              <label for="e-youtube">YouTube</label>
              <input type="text" id="e-youtube" placeholder="Canal YouTube" />
            </div>
          </div>
        </div>
      </div>

      <button class="btn btn-primary" id="btn-save" style="width:100%;padding:13px;margin-top:16px;">
        <span id="save-text">💾 SALVAR ALTERAÇÕES</span>
        <div class="spinner" id="save-spinner" style="display:none"></div>
      </button>
      <div class="save-msg" id="save-msg"></div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="profile.js"></script>
</body>
</html>
